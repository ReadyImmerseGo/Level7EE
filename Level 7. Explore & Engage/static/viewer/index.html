<!DOCTYPE html>

<html lang="en" prefix="og: https://ogp.me/ns#">

<head>
    <title>Speedernet Sphere Experience</title>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no">

    <link rel="stylesheet" href="./static/css/viewer.css">
    <link rel="stylesheet" href="./static/thirdpart/avatarprofile/css/coloris.min.css" />
    <link rel="stylesheet" href="./static/thirdpart/avatarprofile/css/profile.css" />

    <link rel="manifest" id="manifest-json" href="./static/assets/manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="./static/assets/icons/icon-192x192.png">

    <meta name="theme-color" content="#212121"/>

    <!-- TODO add title and description -->
    <!-- perfect size should be a pano for og:image at 1200 x 600 -->
    <meta content="website" property=”og:type”>
    <meta content="Speedernet Sphere Experience" property="og:title">
    <!--<meta content="Immersive experience by Speedernet Sphere" property="og:description">-->
    <meta content="./data/pano_pwa.jpg" property="og:image">
    <meta content="1024" property="og:image:width">
    <meta content="512" property="og:image:height">
    <meta content="image/jpeg" property="og:image:type">
    <meta content="360 panorama" property="og:image:alt">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SpeedernetSphereViewer">
    <meta name="msapplication-TileImage" content="./static/assets/icons/icon-144x144.png">
    <meta name="msapplication-TileColor" content="#000000">

    <link rel="icon" type="image/png" href="./static/assets/SPHERE-favicon.png">
    
    <script src="./static/js/libs/basis/basis_transcoder.js"></script>
</head>

<body>

    <div id="launchscreen">

        <div id="cylinder" class="blurred_start">
            <div class="ring ring-0">
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
                <div class="poly"></div>
            </div>
        </div>

        <div class="main-overlay"></div>

        <div id="titlecontainer" class="titlecontent">
            <div id="title_text"></div>
        </div>
        <div id="https_warning">
            <img src="./static/assets/help/warning.png" id="https_warning_btn" class="pointer">
            <div id="warning-text">
                <p data-i18n-text="https_warning_text" class="https_warning"></p>
                <p data-i18n-text="https_warning_extra" class="https_warning"></p>
            </div>
        </div>

        <div id="sclist">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-card-list" viewBox="0 0 16 16">
                <path d="M14.5 3a.5.5 0 0 1 .5.5v9a.5.5 0 0 1-.5.5h-13a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5zm-13-1A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h13a1.5 1.5 0 0 0 1.5-1.5v-9A1.5 1.5 0 0 0 14.5 2z"/>
                <path d="M5 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 5 8m0-2.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m0 5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-1-5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0M4 8a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0m0 2.5a.5.5 0 1 1-1 0 .5.5 0 0 1 1 0"/>
            </svg>
        </div>

        <div id="logocontent">
            <a id="rightlogourl"><img id="rightlogo"/></a>
            <a id="leftlogourl"><img id="leftlogo"/></a>
        </div>

        <div id="launchcommand">
            <div class="divlaunchimg" id="divwebvrimg">
                <img src="./static/assets/viewer/quest-in.png" id="webvrimg">
                <span id="webvrText"></span>
            </div>
            <div class="divlaunchimg" id="divarimg">
                <img src="./static/assets/viewer/ar-in.png" id="arimg">
                <span id="arText"></span>
            </div>
            <div class="divlaunchimg" id="divscreensimg">
                <img src="./static/assets/viewer/screens-in.png" id="screensimg">
                <span id="screenText"></span>
            </div>
        </div>

        <div id="alertwebgl">
            <p data-i18n-text="webgl_alert"></p>
            <br /><br /><a data-i18n-text="webgl_test_link" href="http://caniuse.com/#feat=webgl"></a>
        </div>

        <div id="help">
            <div class="activeslideshow" id="activeslideshow">
                <img src="./static/assets/help/info.png" id="showhelp" alt="">
            </div>

            <div class="slideshow" id="slideshow">
                <div class="slideshowcontentbackground" id="slideshowcontentbackground"></div>
                <img src="./static/assets/viewer/close.png" id="closehelp" alt="">
                <div class="slideshowcontent">
                    <div class="slide fadeout">
                        <img src="./static/assets/help/desktop_navigation-en.png" id="helpcardboard" alt="">
                    </div>
                    <div class="slide fadeout">
                        <img src="./static/assets/help/touchscreen-navigation-en.png" id="helpwebvr" alt="">
                    </div>
                    <div class="slide fadeout">
                        <img src="./static/assets/help/vrheadset-navigation-en.png" id="helpmobile" alt="">
                    </div>
                    <div class="slide fadeout">
                        <img src="./static/assets/help/cardboard-navigation-en.png" id="helpdesktop" alt="">
                    </div>

                    <a class="prev" onclick="main.nextSlide(-1)">&#10094;</a>
                    <a class="next" onclick="main.nextSlide(1)">&#10095;</a>

                    <div class="dotcontainer">
                        <span class="dot" onclick="main.currentSlide(1)"></span>
                        <span class="dot" onclick="main.currentSlide(2)"></span>
                        <span class="dot" onclick="main.currentSlide(3)"></span>
                        <span class="dot" onclick="main.currentSlide(4)"></span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="audios"></div>
    <div id="videos"></div>
    <video autoplay id="livestream" hidden="true"></video>
    <div id="compass" class="compass">
        <img src="./static/assets/viewer/compass.png" id="compassimg">
    </div>

    <div id="fullscreen" class="fullscreen">
        <img src="./static/assets/viewer/fullscreen.png" id="fullscreenimg">
    </div>

    <div id="load_background"></div>
        <div id="load_bar">
            <div id='load_bar_background' ></div>
            <div id="load_bar_mask" ></div>
        </div>
    </div>

    <div id="load_explain">
        <div id="load_label"></div>
        <div id="load_detail"></div>
    </div>

    <div id="close">
        <img src="./static/assets/viewer/close.png" id="closeimg">
    </div>

    <div id="synch">
        <div id="pwa-div">
            <div id="btn-install-pwa-container">
                <div id="btn-install-pwa"></div>
                <div id="btn-install-pwa-text" class="unselectable"></div>
            </div>
        </div>
        <div id="preload-div">
            <div id="btn-preload-container">
                <div id="btn-preload"></div>
                <div id="btn-preload-progress"></div>
                <div id="btn-preload-text" class="unselectable"></div>
            </div>
        </div>
        <div id="synch-info-div">
            <div id="synch-info-text" class="unselectable"></div>
        </div>
    </div>

    <canvas id="glcanvas"></canvas>
    <canvas id="videocanvas"></canvas>

    <div id="localSave" class="localSavePopup">
        <div id="labelLocalSave" class="localSaveTitle"></div>
        <div id="cancelLocalSaveButton" class="localSaveCancelButton"></div>
        <div id="validateLocalSaveButton" class="localSaveValidateButton"></div>
        <div id="labelSaveWarnExportid" class="labelSaveWarnExportid"></div>
    </div>
    <div id="localSaveInfo" class="localSaveInfo"></div>

    <div id="onDefocusDiv" class="onDefocusDiv"></div>

    <button id="openMenuButton" data-i18n-title="open_menu_tooltip" style="display: none" class="position-absolute hide-interface">
        <img id="openMenuButtonImage" src="./static/assets/menu/icon_menu_rest.png" alt="">
    </button>
    <button id="openUsersPanelButton" data-i18n-title="open_users_panel_tooltip" style="display: none"
        class="position-absolute hide-interface overlay-shadow">
        <img id="openUsersPanelImage" src="./static/assets/menu/icon_users_panel.png" alt="">
    </button>
    <div id="audioControls" style="display: none" class="hide-interface overlay-shadow">
        <div id="microControl" class="audioControl">
            <div id="microControlButton" class="audioControlButton" data-i18n-title="mute_tooltip">
                <img id="microControlImg" class="micIcon microOn" src="./static/assets/menu/icon_voiceOn.png"
                    alt="Couper/rétablir le micro">
                <span id="microPulse" class="pulse noAnimation"></span>
            </div>
        </div>
        <div id="soundControl" class="audioControl">
            <button id="soundControlButton" class="audioControlButton" data-i18n-title="deafen_tooltip">
                <img class="soundIcon soundOn" src="./static/assets/menu/icon_soundOn.png" alt="Couper/rétablir le son">
            </button>
        </div>
    </div>
    <button id="raiseHandButton" data-i18n-title="raise_hand_tooltip" style="display: none"
        class="position-absolute hide-interface overlay-shadow">
        <img class="handIcon raiseHand" src="./static/assets/menu/icon_raiseHand.png" alt="Lever/baisser la main">
    </button>
    <div id="usersListContainer" class="hide-interface overlay-shadow">
        <div class="usersListTitle">
            <img src="./static/assets/menu/icon_user.png" alt="">
            <h5><span id="usersPanelName" data-i18n-text="users_panel_name"></span> <span id="usersCount"></span></h5>
        </div>
        <button id="closeUsersPanelButton" class="closeButton">
            <img class="closeButtonImage icon" src="./static/assets/chat/icon_close.png" alt="Close">
        </button>
        <div id="usersList"></div>
    </div>
    <div id="reportPopupContainer" class="position-absolute menuPopin overlay-shadow" tabindex="-1">
        <div id="usersPopup" class="menuContainer">
            <button id="closeReportButton" class="closeButton">
                <img class="closeButtonImage icon" src="./static/assets/chat/icon_close.png" alt="Close">
            </button>
            <h1 class='textTitle red menuTitle' data-i18n-text="report_popup_title"></h1>
            <div class="reportContent">
                <p><span data-i18n-text="report_popup_text"></span> <span id="userName"></span></p>
                <p>
                    <label data-i18n-text="report_popup_select_reason"></label>
                    <select id="reportReason">
                        <option name="InappropriateMessage" value="0" data-i18n-text="report_popup_select_reason_option_0"></option>
                        <option name="OffensiveLanguage" value="1" data-i18n-text="report_popup_select_reason_option_1"></option>
                        <option name="AnormalBehaviour" value="2" data-i18n-text="report_popup_select_reason_option_2"></option>
                        <option name="Other" value="3" data-i18n-text="report_popup_select_reason_option_3"></option>
                    </select>
                </p>
                <textarea id="reportDetails" type="text" data-i18n-placeholder="report_popup_textarea_placeholder" maxlength="300"></textarea>
            </div>
            <button id="sendReport" class="button secondaryButton" data-i18n-text="report_popup_send_report"></button>
        </div>
    </div>
    <div id="renamePopupContainer" class="position-absolute menuPopin overlay-shadow" tabindex="-1">
        <div id="renamePopup" class="menuContainer">
            <h1 data-i18n-text="rename_popup_title" class='textTitle red menuTitle'></h1>
            <p data-i18n-text="rename_popup_text" class="renamePopupText"></p>
            <div class="renameContent">
                <input id="renameInputFirstname" data-i18n-placeholder="rename_popup_input_firstname" type="text" maxlength="20">
                <input id="renameInputLastname" data-i18n-placeholder="rename_popup_input_lastname" type="text" maxlength="20">
            </div>
            <button id="sendRename" class="button secondaryButton" data-i18n-text="rename_popup_confirm"></button>
        </div>
    </div>
    <div id="menuPopin" class="position-absolute menuPopin" tabindex="-1">
        <div class="menuContainer overlay-shadow">
            <button id="closeButton" class="closeButton">
                <img class="closeButtonImage icon" src="./static/assets/chat/icon_close.png" alt="Close">
            </button>
            <h1 data-i18n-text="menu_popup_title" class='textTitle red menuTitle'></h1>
            <button id="accountButton" class="button primaryButton" data-i18n-text="menu_popup_account"></button>
            <button id="leaveButton" class="button secondaryButton" data-i18n-text="menu_popup_leave"></button>
        </div>
    </div>

    <div id="alertPopup" hidden class="position-absolute overlay-shadow"
        style="background-color:white; padding: 15px; border-radius: 12px; text-align: left;">
        <span style="display: flex; flex-direction: row; justify-content: flex-start;">
            <img id="alertIconPositive" class="alertIcon" src="./static/assets/alert/picto_event.png">
            <img id="alertIconNegative" class="alertIcon" src="./static/assets/alert/picto_alerte.png">
            <h5 id="alertTitle" class="textTitle"></h5>
        </span>
        <p id="alertText" class="textBody" style="color: black;"></p>
    </div>
    <div class="position-absolute chatContainer">
        <div id="chat" class="chat hide-interface overlay-shadow">
            <button id="closeChat" class="closeChatButton">
                <h5 class="textTitle" data-i18n-text="chat_popup_title"></h5>
                <div id="closeChat">
                    <img class="chatCloseIcon" alt="">
                </div>
            </button>
            <div id="chatMessages" class="chatMessages">
            </div>
            <div style="display: flex; flex-wrap: nowrap; justify-content: flex-end; position: relative;">
                <div id="userMentionList" class="userMentionList overlay-shadow"></div>
                <div id="chatInput" class="chatInput" data-i18n-placeholder="chat_popup_input_placeholder" contenteditable="true" maxlength="150"></div>
                <div id="sendChat" class="sendChatButton">
                    <img class="sendChatIcon" src="./static/assets/chat/icon_send.png" alt="">
                </div>
            </div>
        </div>
    </div>
    <div id="expandChat" class="position-absolute expandChatButton hide-interface overlay-shadow">
        <span id="chatNotification" class="position-absolute"
            hidden="true">
            0
        </span>
        <div id="openChat">
            <img src="./static/assets/chat/icon_bulle.png" class="chatOpenIcon" alt="">
        </div>
    </div>
    <div id="thirdpart"></div>
    <script type="module" src="./static/js/main-viewer.js"></script>
    <script type="text/javascript" src="./api/api-wrapper.js"></script>
</body>

</html>
